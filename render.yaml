services:
  # Web Service running the FastAPI and React frontend
  - type: web
    name: idr-transaction-system
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: idr-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: idr-redis
          property: connectionString

  # Redis Cache
  - type: redis
    name: idr-redis
    plan: free
    ipAllowList: [] # Allows access only from other services in the Render account

databases:
  # PostgreSQL Database
  - name: idr-postgres
    plan: free
    postgresMajorVersion: 16
